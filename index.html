<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep Rwanda - Senior 6 PCM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #059669;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-4xl mx-auto px-6 py-12">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-700 mb-2">ExamPrep Rwanda</h1>
      <p class="text-xl text-gray-600">Senior 6 PCM • CBC Curriculum Practice Tests</p>
    </div>

    <div class="bg-white shadow-xl rounded-3xl p-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Subject</label>
          <select id="subject" class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Mathematics">Mathematics</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Number of Questions</label>
          <input id="numQuestions" type="number" value="10" min="5" max="20" 
                 class="w-full border border-gray-300 rounded-2xl px-4 py-3">
        </div>
        <div class="flex items-end">
          <button onclick="generateTest()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center gap-3 transition-colors">
            Generate Practice Test
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-8 py-5 border-b flex justify-between items-center bg-white sticky top-0">
        <h2 class="text-2xl font-semibold">Your Practice Test</h2>
        <div class="flex gap-3">
          <button onclick="downloadPDF()" 
                  class="flex items-center gap-2 bg-emerald-600 text-white px-6 py-2 rounded-2xl hover:bg-emerald-700 transition-colors">
            Download PDF
          </button>
          <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600 px-2">×</button>
        </div>
      </div>
      <div id="test-content" class="p-8 overflow-auto flex-1 bg-white">
        </div>
    </div>
  </div>

  <script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // Configuration
    const GEMINI_API_KEY = "AIzaSyDKYP2XaLsz8qCMCTMoTuXZFv9s604KHZg";

    // Attach functions to window so HTML 'onclick' can find them
    window.generateTest = async function() {
      const subject = document.getElementById('subject').value;
      const numQuestions = parseInt(document.getElementById('numQuestions').value) || 10;
      const content = document.getElementById('test-content');
      const modal = document.getElementById('modal');

      // Show Modal and Loading State
      content.innerHTML = `
        <div class="flex flex-col items-center justify-center h-64">
          <div class="loader mb-4"></div>
          <p class="text-xl text-gray-600">Gemini is crafting your ${subject} test...</p>
        </div>`;
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
        // Using gemini-1.5-flash for speed and reliability
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const prompt = `You are an expert examiner for Rwanda National Examinations (REB), Senior 6 PCM (CBC curriculum).
        Generate a ${numQuestions}-question practice test for ${subject}.
        Instructions:
        1. Use official CBC standards.
        2. Output ONLY clean, self-contained HTML (no markdown blocks like \`\`\`html).
        3. Use Tailwind CSS classes for styling.
        4. Include a clear Title, Instructions, and Questions.
        5. Provide space for student answers.`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let html = response.text();

        // Safety: Strip markdown if the AI includes it anyway
        html = html.replace(/```html|```/gi, '').trim();

        content.innerHTML = html;

      } catch (error) {
        console.error("Gemini Error:", error);
        content.innerHTML = `
          <div class="text-center py-12">
            <p class="text-red-500 font-bold text-xl mb-2">Generation Failed</p>
            <p class="text-gray-600">${error.message}</p>
            <button onclick="closeModal()" class="mt-4 text-emerald-600 underline">Try again</button>
          </div>`;
      }
    };

    window.downloadPDF = function() {
      const element = document.getElementById('test-content');
      const subject = document.getElementById('subject').value;
      const opt = {
        margin: 10,
        filename: `ExamPrep_Rwanda_${subject}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    };

    window.closeModal = function() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    };
  </script>
</body>
</html>
