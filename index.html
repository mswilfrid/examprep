<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep Rwanda - Senior 6 PCM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- Google Gemini SDK - Correct CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-4xl mx-auto px-6 py-12">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-700 mb-2">ExamPrep Rwanda</h1>
      <p class="text-xl text-gray-600">Senior 6 PCM • CBC Curriculum Practice Tests</p>
    </div>

    <div class="bg-white shadow-xl rounded-3xl p-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Subject</label>
          <select id="subject" class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Mathematics">Mathematics</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Number of Questions</label>
          <input id="numQuestions" type="number" value="10" min="5" max="20" 
                 class="w-full border border-gray-300 rounded-2xl px-4 py-3">
        </div>
        <div class="flex items-end">
          <button onclick="generateTest()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center gap-3">
            <i class="fas fa-bolt"></i>
            Generate Practice Test
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-8 py-5 border-b flex justify-between items-center">
        <h2 class="text-2xl font-semibold">Your Practice Test</h2>
        <div class="flex gap-3">
          <button onclick="downloadPDF()" 
                  class="flex items-center gap-2 bg-emerald-600 text-white px-6 py-2 rounded-2xl hover:bg-emerald-700">
            <i class="fas fa-download"></i> Download PDF
          </button>
          <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
      </div>
      <div id="test-content" class="p-8 overflow-auto flex-1 bg-white">
        <!-- Test HTML appears here -->
      </div>
    </div>
  </div>

  <script>
// ==================== YOUR GEMINI API KEY ====================
const GEMINI_API_KEY = "AIzaSyDKYP2XaLsz8qCMCTMoTuXZFv9s604KHZg"; 

async function generateTest() {
  const subject = document.getElementById('subject').value;
  const numQuestions = parseInt(document.getElementById('numQuestions').value) || 10;

  const content = document.getElementById('test-content');
  const modal = document.getElementById('modal');

  content.innerHTML = `
    <div class="flex flex-col items-center justify-center h-96">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-emerald-600 mb-6"></div>
      <p class="text-xl">Generating with Gemini...</p>
    </div>`;
  modal.classList.remove('hidden');
  modal.classList.add('flex');

  try {
    // FIX 1: Access the SDK via the window.generativeAI object
    const { GoogleGenerativeAI } = window.generativeAI; 
    
    const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
    
    // FIX 2: Use a valid model name (gemini-1.5-flash)
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const prompt = `You are an expert examiner for Rwanda National Examinations, Senior 6 PCM (CBC curriculum).
      Generate a ${numQuestions}-question practice test for ${subject}.
      Use official REB CBC textbooks and recent past papers.
      Output **ONLY** clean, self-contained HTML. No markdown code blocks (no \`\`\`html).
      Make it professional and print-ready. Use Tailwind CSS classes.
      Include title, instructions, numbered questions, and space for answers.`;

    const result = await model.generateContent(prompt);
    let html = result.response.text();

    // Clean markdown if the AI still includes it
    html = html.replace(/```html|```/gi, '').trim();

    content.innerHTML = html;

  } catch (error) {
    console.error(error);
    content.innerHTML = `
      <p class="text-red-500 text-center py-12">
        Failed to generate test<br>
        <span class="text-sm opacity-75">${error.message}</span>
      </p>`;
  }
}

// ... Keep your downloadPDF and closeModal functions the same ...

    // Initialize Tailwind
    tailwind.config = { content: ["**/*.{html,js}"] };
  </script>
</body>
</html>
