<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep Rwanda - Senior 6 PCM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #059669;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-4xl mx-auto px-6 py-12">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-700 mb-2 text-shadow-sm">ExamPrep Rwanda</h1>
      <p class="text-xl text-gray-600">Senior 6 PCM • CBC Curriculum Practice Tests</p>
    </div>

    <div class="bg-white shadow-xl rounded-3xl p-8 border border-gray-100">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Subject</label>
          <select id="subject" class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 outline-none">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Mathematics">Mathematics</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2 text-gray-700">Number of Questions</label>
          <input id="numQuestions" type="number" value="10" min="5" max="20" 
                 class="w-full border border-gray-300 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div class="flex items-end">
          <button onclick="generateTest()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-3xl text-lg transition-all active:scale-95 shadow-lg shadow-emerald-100">
            Generate Test
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-8 py-5 border-b flex justify-between items-center bg-white">
        <h2 class="text-2xl font-bold text-gray-800">Your Practice Test</h2>
        <div class="flex gap-3">
          <button onclick="downloadPDF()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl hover:bg-emerald-700 font-medium transition-colors">
            Download PDF
          </button>
          <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600 px-2 transition-colors">×</button>
        </div>
      </div>
      <div id="test-content" class="p-10 overflow-auto flex-1 bg-white leading-relaxed text-gray-800">
        </div>
    </div>
  </div>

  <script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyDKYP2XaLsz8qCMCTMoTuXZFv9s604KHZg";

    window.generateTest = async function() {
      const subject = document.getElementById('subject').value;
      const numQuestions = document.getElementById('numQuestions').value;
      const content = document.getElementById('test-content');
      const modal = document.getElementById('modal');

      content.innerHTML = `
        <div class="flex flex-col items-center justify-center h-64 text-center">
          <div class="loader mb-6"></div>
          <p class="text-lg text-gray-600">Gemini is writing your ${subject} test questions...</p>
          <p class="text-sm text-gray-400">This usually takes 10-15 seconds.</p>
        </div>`;
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        // We use gemini-1.5-flash as it is the most stable for browser requests
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash"
        });

        const prompt = `Generate a ${numQuestions}-question practice exam for Senior 6 ${subject} students in Rwanda (CBC curriculum). 
        Include a title and professional formatting. 
        Return ONLY the HTML content. Do NOT include markdown code blocks (no \`\`\`html). 
        Use Tailwind CSS classes for high-quality typography.`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let html = response.text();
        
        // Cleanup markdown just in case the AI ignored instructions
        html = html.replace(/```html|```/gi, '').trim();

        content.innerHTML = html;

      } catch (err) {
        console.error("Gemini SDK Error:", err);
        content.innerHTML = `
          <div class="text-center py-12">
            <p class="text-red-500 font-bold text-xl mb-4">Connection Failed</p>
            <div class="bg-red-50 p-4 rounded-xl text-red-700 text-sm mb-6 max-w-md mx-auto text-left overflow-auto">
              ${err.message}
            </div>
            <button onclick="closeModal()" class="text-emerald-600 font-medium hover:underline">Close and check API Key</button>
          </div>`;
      }
    };

    window.downloadPDF = function() {
      const element = document.getElementById('test-content');
      const subject = document.getElementById('subject').value;
      const opt = {
        margin: [15, 15],
        filename: `S6_${subject}_ExamPrep.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    };

    window.closeModal = function() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    };
  </script>
</body>
</html>
