<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep Rwanda - Senior 6 PCM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-4xl mx-auto px-6 py-12">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-700 mb-2">ExamPrep Rwanda</h1>
      <p class="text-xl text-gray-600">Senior 6 PCM • CBC Curriculum Practice Tests</p>
    </div>

    <div class="bg-white shadow-xl rounded-3xl p-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Subject</label>
          <select id="subject" class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Mathematics">Mathematics</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Number of Questions</label>
          <input id="numQuestions" type="number" value="10" min="5" max="20" 
                 class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-emerald-500">
        </div>
        <div class="flex items-end">
          <button onclick="generateTest()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center gap-3 transition">
            <i class="fas fa-bolt"></i> Generate Practice Test
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-8 py-5 border-b flex justify-between items-center bg-gray-50">
        <h2 class="text-2xl font-semibold">Your Practice Test</h2>
        <div class="flex gap-3">
          <button onclick="downloadPDF()" 
                  class="flex items-center gap-2 bg-emerald-600 text-white px-6 py-2.5 rounded-2xl hover:bg-emerald-700 transition">
            <i class="fas fa-download"></i> Download PDF
          </button>
          <button onclick="closeModal()" 
                  class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
      </div>
      <div id="test-content" class="p-8 overflow-auto flex-1 bg-white">
        <!-- Generated test appears here -->
      </div>
    </div>
  </div>

  <script>
    // ==================== YOUR GEMINI API KEY ====================
    const GEMINI_API_KEY = "AIzaSyDKYP2XaLsz8qCMCTMoTuXZFv9s604KHZg";   // ← PASTE YOUR REAL API KEY HERE

    async function generateTest() {
      const subject = document.getElementById('subject').value;
      const numQuestions = parseInt(document.getElementById('numQuestions').value) || 10;

      const content = document.getElementById('test-content');
      const modal = document.getElementById('modal');

      // Show loading state
      content.innerHTML = `
        <div class="flex flex-col items-center justify-center h-96 text-center">
          <i class="fas fa-spinner fa-spin text-6xl text-emerald-600 mb-6"></i>
          <p class="text-xl text-gray-600">Generating your ${subject} practice test with Gemini...</p>
        </div>`;
      
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `You are an expert examiner for Rwanda National Examinations, Senior 6 PCM (CBC curriculum).

Generate a ${numQuestions}-question practice test for ${subject}.

Use official REB CBC textbooks and recent national exam past papers as reference.
Output ONLY clean, self-contained HTML. No explanations, no markdown, no extra text outside the HTML.

Make it professional and print-ready. Use Tailwind CSS classes where appropriate.
Include:
- Title with "ExamPrep Rwanda - Senior 6 PCM"
- Clear instructions for the student
- Numbered questions (mix of MCQ, structured, and calculation)
- Space for student answers and workings`
              }]
            }]
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        let html = data.candidates[0].content.parts[0].text;

        // Clean any markdown code blocks Gemini sometimes adds
        html = html.replace(/```html|```/gi, '').trim();

        content.innerHTML = html;

      } catch (error) {
        console.error("Error:", error);
        content.innerHTML = `
          <div class="text-center py-12">
            <p class="text-red-500 text-lg font-medium">Failed to generate test</p>
            <p class="text-gray-600 mt-3">${error.message}</p>
            <p class="text-sm text-gray-500 mt-6">Please check your Gemini API key and try again.</p>
          </div>`;
      }
    }

    function downloadPDF() {
      const element = document.getElementById('test-content');
      const opt = {
        margin: 12,
        filename: `ExamPrep_${document.getElementById('subject').value}_Senior6.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Initialize Tailwind
    tailwind.config = { content: ["**/*.{html,js}"] };
  </script>
</body>
</html>
