<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep - Senior 6 PCM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'); </style>
</head>
<body class="bg-gray-50 font-sans">

  <!-- HERO + FORM -->
  <div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold text-center text-emerald-700 mb-2">ExamPrep Rwanda</h1>
    <p class="text-center text-xl text-gray-600 mb-10">Senior 6 PCM • CBC Curriculum Practice Tests</p>

    <div class="bg-white shadow-xl rounded-3xl p-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Subject</label>
          <select id="subject" class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Mathematics">Mathematics</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Number of Questions</label>
          <input id="numQuestions" type="number" value="10" min="5" max="20" class="w-full border border-gray-300 rounded-2xl px-4 py-3">
        </div>
        <div class="flex items-end">
          <button onclick="generateTest()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 px-8 rounded-3xl text-lg flex items-center justify-center gap-3">
            <i class="fas fa-bolt"></i>
            Generate Practice Test
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
      <div class="px-8 py-4 border-b flex justify-between items-center">
        <h2 class="text-2xl font-semibold">Your Practice Test</h2>
        <div class="flex gap-3">
          <button onclick="downloadPDF()" 
                  class="flex items-center gap-2 bg-emerald-600 text-white px-6 py-2 rounded-2xl hover:bg-emerald-700">
            <i class="fas fa-download"></i> Download PDF
          </button>
          <button onclick="closeModal()" 
                  class="text-gray-500 hover:text-gray-700 text-3xl leading-none">×</button>
        </div>
      </div>
      <div id="test-content" class="p-8 overflow-auto flex-1 prose max-w-none">
        <!-- Dumpling HTML lands here -->
      </div>
    </div>
  </div>

  <script>
    // Tailwind CDN init
    tailwind.config = { content: ["./**/*.{html,js}"] };

    async function generateTest() {
  const subject = document.getElementById('subject').value;
  const numQuestions = document.getElementById('numQuestions').value;

  // Show loading...
  const content = document.getElementById('test-content');
  content.innerHTML = `<div class="flex flex-col items-center justify-center h-96">
    <i class="fas fa-spinner fa-spin text-6xl text-emerald-600 mb-6"></i>
    <p>Generating with Claude...</p>
  </div>`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'YOUR_ANTHROPIC_API_KEY_HERE',   // ← Put your key here (or use env variable in production)
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: "claude-3-5-sonnet-20241022",
        max_tokens: 4000,
        system: `You are an expert Rwandan examiner for Senior 6 PCM CBC. 
                 Generate accurate practice tests based on REB textbooks and past papers.
                 Output ONLY clean self-contained HTML. No extra text.`,
        messages: [{
          role: "user",
          content: `Generate a ${numQuestions}-question practice test for ${subject} (Senior 6 PCM CBC Rwanda). 
                    Make it professional and print-ready.`
        }]
      })
    });

    const data = await response.json();
    const html = data.content[0].text;   // Claude returns the HTML directly

    if (html) {
      content.innerHTML = html;
    } else {
      content.innerHTML = `<p class="text-red-500">No HTML received.</p>`;
    }
  } catch (err) {
    console.error(err);
    content.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
  }
    }
  </script>
</body>
</html>
