<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep Rwanda - Senior 6 PCM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // YOUR API KEY FROM SCREENSHOT
    const API_KEY = "AIzaSyDKYP2XaLsz8qCMCTMoTuXZFv9s604KHZg";

    window.generateTest = async function() {
      const subject = document.getElementById('subject').value;
      const numQuestions = document.getElementById('numQuestions').value;
      const content = document.getElementById('test-content');
      const modal = document.getElementById('modal');

      content.innerHTML = `<div class="flex flex-col items-center justify-center h-64"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mb-4"></div><p>Generating ${subject} Exam...</p></div>`;
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const genAI = new GoogleGenerativeAI(API_KEY);
        // Explicitly using gemini-1.5-flash which works with Free Tier
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const prompt = `You are a teacher in Rwanda. Generate a ${numQuestions} question practice test for Senior 6 ${subject} (PCM) based on the CBC curriculum. Output ONLY the questions in clean HTML format with Tailwind CSS styling. Do not use markdown code blocks.`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let text = response.text();
        
        // Remove any unwanted markdown backticks if AI adds them
        text = text.replace(/```html|```/gi, '').trim();
        content.innerHTML = text;

      } catch (err) {
        content.innerHTML = `<div class="text-red-500 p-8"><b>Error:</b> ${err.message}<br><br>Check if your API Key is active in AI Studio.</div>`;
      }
    };

    window.downloadPDF = function() {
      const element = document.getElementById('test-content');
      html2pdf().from(element).save(`S6_${document.getElementById('subject').value}_Test.pdf`);
    };

    window.closeModal = function() {
      document.getElementById('modal').classList.add('hidden');
    };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">

  <div class="max-w-3xl mx-auto mt-12 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
    <h1 class="text-4xl font-bold text-emerald-800 text-center mb-2">ExamPrep Rwanda</h1>
    <p class="text-center text-slate-500 mb-8">S6 PCM CBC Practice Test Generator</p>

    <div class="space-y-6">
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col">
          <label class="text-sm font-semibold mb-1 ml-1">Subject</label>
          <select id="subject" class="bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
            <option>Physics</option>
            <option>Chemistry</option>
            <option>Mathematics</option>
          </select>
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold mb-1 ml-1">Questions</label>
          <input id="numQuestions" type="number" value="10" class="bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
      </div>

      <button onclick="generateTest()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200">
        Generate Test
      </button>
    </div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-4xl h-[90vh] rounded-3xl shadow-2xl flex flex-col">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-xl font-bold">Practice Test</h2>
        <div class="flex gap-2">
          <button onclick="downloadPDF()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Download PDF</button>
          <button onclick="closeModal()" class="text-slate-400 text-2xl px-2">×</button>
        </div>
      </div>
      <div id="test-content" class="flex-1 overflow-y-auto p-8 prose max-w-none">
        </div>
    </div>
  </div>

</body>
</html>
